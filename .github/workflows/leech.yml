name: Leech to Drive
run-name: Ferry transfer ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Magnet link or HTTP/HTTPS URL
        required: true
        type: string
      job_id:
        description: Ferry job ID
        required: true
        type: string
      callback_url:
        description: Ferry webhook URL
        required: true
        type: string
      drive_folder:
        description: Google Drive folder
        required: false
        default: Ferry
        type: string
      runner_label:
        description: GitHub runner label, for example ubuntu-latest or a larger runner label
        required: false
        default: ubuntu-latest
        type: string

permissions:
  contents: read
  packages: read

jobs:
  leech:
    runs-on: ${{ inputs.runner_label || vars.FERRY_RUNNER_LABEL || 'ubuntu-latest' }}
    container:
      image: ghcr.io/${{ github.repository_owner }}/ferry-runner-tools:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 360

    steps:
      - name: Validate runner secrets
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          test -n "$RCLONE_CONF" || (echo "RCLONE_CONF secret is missing." && exit 1)
          test -n "$WEBHOOK_SECRET" || (echo "WEBHOOK_SECRET secret is missing." && exit 1)

      - name: Report started
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          JOB_ID: ${{ inputs.job_id }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import hashlib, hmac, json, os, urllib.request
          body = json.dumps({
              "jobId": os.environ["JOB_ID"],
              "status": "running",
              "workflowRunId": os.environ["WORKFLOW_RUN_ID"],
          }, separators=(",", ":")).encode()
          sig = "sha256=" + hmac.new(os.environ["WEBHOOK_SECRET"].encode(), body, hashlib.sha256).hexdigest()
          req = urllib.request.Request(os.environ["CALLBACK_URL"], data=body, method="POST", headers={
              "Content-Type": "application/json",
              "User-Agent": "Ferry-Runner/1.0",
              "X-Ferry-Signature": sig,
          })
          try:
              urllib.request.urlopen(req, timeout=10).read()
          except Exception as exc:
              print(f"Webhook start report failed: {exc}")
          PY

      - name: Download source
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          CALLBACK_URL: ${{ inputs.callback_url }}
          JOB_ID: ${{ inputs.job_id }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p out
          python3 - <<'PY'
          import hashlib, hmac, json, os, re, secrets, subprocess, time, urllib.error, urllib.parse, urllib.request

          callback_url = os.environ["CALLBACK_URL"]
          job_id = os.environ["JOB_ID"]
          webhook_secret = os.environ["WEBHOOK_SECRET"].encode()
          workflow_run_id = os.environ["WORKFLOW_RUN_ID"]
          rpc_url = "http://127.0.0.1:9091/transmission/rpc"
          session_id = ""
          source_url = os.environ["SOURCE_URL"]
          extra_trackers = [
              "udp://tracker.opentrackr.org:1337/announce",
              "udp://open.stealth.si:80/announce",
              "udp://tracker.torrent.eu.org:451/announce",
              "udp://tracker.dler.org:6969/announce",
              "udp://open.demonii.com:1337/announce",
              "udp://exodus.desync.com:6969/announce",
              "udp://tracker-udp.gbitt.info:80/announce",
              "udp://opentracker.i2p.rocks:6969/announce",
              "udp://open.tracker.cl:1337/announce",
              "udp://tracker.bittor.pw:1337/announce",
              "udp://tracker.dump.cl:6969/announce",
              "udp://tracker.ololosh.space:6969/announce",
              "udp://tracker.qu.ax:6969/announce",
              "udp://tracker.tryhackx.org:6969/announce",
              "udp://tracker2.dler.org:80/announce",
              "udp://wepzone.net:6969/announce",
              "https://tracker.cloudit.top:443/announce",
              "https://tracker.lilithraws.org:443/announce",
              "https://tracker.yemekyedim.com:443/announce",
              "http://tracker.mywaifu.best:6969/announce",
              "https://tracker.tamersunion.org:443/announce",
              "https://tracker.gbitt.info:443/announce",
          ]

          def source_with_extra_trackers(value):
              if not value.startswith("magnet:?"):
                  return value
              parsed = urllib.parse.urlparse(value)
              params = urllib.parse.parse_qsl(parsed.query, keep_blank_values=True)
              existing = {tracker for key, tracker in params if key == "tr"}
              additions = []
              for tracker in extra_trackers:
                  if tracker not in existing:
                      additions.append("tr=" + urllib.parse.quote(tracker, safe=""))
                      existing.add(tracker)
              if not additions:
                  return value
              separator = "&" if parsed.query else "?"
              return value + separator + "&".join(additions)

          def expected_size(value):
              if not value.startswith("magnet:?"):
                  return 0
              params = urllib.parse.parse_qs(urllib.parse.urlparse(value).query)
              try:
                  return int(params.get("xl", ["0"])[0])
              except Exception:
                  return 0

          expected_total = expected_size(source_url)

          def is_http_source(value):
              return value.startswith("http://") or value.startswith("https://")

          def format_bytes(value):
              value = float(value or 0)
              for unit in ["B", "KiB", "MiB", "GiB", "TiB"]:
                  if value < 1024 or unit == "TiB":
                      return f"{value:.1f} {unit}" if unit != "B" else f"{int(value)} B"
                  value /= 1024

          def report(status, phase, downloaded=0, total=0, speed=0, peers=0, seeders=0, error=None):
              body = {
                  "jobId": job_id,
                  "status": status,
                  "workflowRunId": workflow_run_id,
                  "progressPhase": phase,
                  "downloadedBytes": int(downloaded or 0),
                  "totalBytes": int(total or 0),
                  "speedBytesPerSecond": int(speed or 0),
                  "peerCount": int(peers or 0),
                  "seederCount": int(seeders or 0),
              }
              if error:
                  body["errorMessage"] = error
              data = json.dumps(body, separators=(",", ":")).encode()
              sig = "sha256=" + hmac.new(webhook_secret, data, hashlib.sha256).hexdigest()
              req = urllib.request.Request(callback_url, data=data, method="POST", headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Ferry-Runner/1.0",
                  "X-Ferry-Signature": sig,
              })
              try:
                  urllib.request.urlopen(req, timeout=10).read()
              except Exception as exc:
                  print(f"Progress webhook failed: {exc}")

          def output_name_from_response(url, response):
              disposition = response.headers.get("content-disposition") or ""
              match = re.search(r'filename\*?=(?:UTF-8\'\')?"?([^";]+)"?', disposition, re.I)
              if match:
                  return urllib.parse.unquote(match.group(1)).strip() or "download.bin"
              final_url = response.geturl() if hasattr(response, "geturl") else url
              path_name = urllib.parse.urlparse(final_url or url).path.rstrip("/").split("/")[-1]
              return urllib.parse.unquote(path_name) or "download.bin"

          def safe_output_path(name):
              safe_name = name.replace("/", "_").replace("\\", "_").strip()
              return os.path.join("out", safe_name or "download.bin")

          def download_http_source(url):
              output_name = None
              try:
                  request = urllib.request.Request(url, method="HEAD", headers={"User-Agent": "Ferry-Runner/1.0"})
                  with urllib.request.urlopen(request, timeout=30) as response:
                      output_name = output_name_from_response(url, response)
              except Exception as exc:
                  print(f"HTTP metadata probe failed: {exc}")
              output_path = safe_output_path(output_name or urllib.parse.urlparse(url).path.rstrip("/").split("/")[-1])
              output_name = os.path.basename(output_path)
              rpc_secret = secrets.token_urlsafe(24)
              rpc_url = "http://127.0.0.1:6801/jsonrpc"

              def aria2_rpc(method, params=None):
                  payload = json.dumps({
                      "jsonrpc": "2.0",
                      "id": "ferry",
                      "method": method,
                      "params": [f"token:{rpc_secret}", *(params or [])],
                  }).encode()
                  req = urllib.request.Request(rpc_url, data=payload, method="POST", headers={
                      "Content-Type": "application/json",
                  })
                  with urllib.request.urlopen(req, timeout=10) as rpc_response:
                      result = json.loads(rpc_response.read().decode())
                  if "error" in result:
                      raise RuntimeError(result["error"])
                  return result.get("result")

              command = [
                  "aria2c",
                  "--dir=out",
                  f"--out={output_name}",
                  "--continue=true",
                  "--allow-overwrite=true",
                  "--auto-file-renaming=false",
                  "--file-allocation=none",
                  "--max-connection-per-server=16",
                  "--split=16",
                  "--min-split-size=1M",
                  "--max-tries=5",
                  "--retry-wait=5",
                  "--timeout=60",
                  "--connect-timeout=30",
                  "--lowest-speed-limit=1K",
                  "--summary-interval=0",
                  "--console-log-level=warn",
                  "--log=aria2-http.log",
                  "--log-level=notice",
                  "--enable-rpc=true",
                  "--rpc-listen-all=false",
                  "--rpc-listen-address=127.0.0.1",
                  "--rpc-listen-port=6801",
                  f"--rpc-secret={rpc_secret}",
                  url,
              ]

              report("running", "downloading", 0, 0, 0)
              process = subprocess.Popen(command)
              started_at = time.time()
              last_report = 0
              downloaded = total = speed = 0
              try:
                  while process.poll() is None:
                      time.sleep(2)
                      try:
                          active = aria2_rpc("aria2.tellActive")
                          waiting = aria2_rpc("aria2.tellWaiting", [0, 10])
                          stopped = aria2_rpc("aria2.tellStopped", [0, 10])
                          items = list(active or []) + list(waiting or []) + list(stopped or [])
                          if items:
                              downloaded = sum(int(item.get("completedLength", 0)) for item in items)
                              total = sum(int(item.get("totalLength", 0)) for item in items)
                              speed = sum(int(item.get("downloadSpeed", 0)) for item in active or [])
                          now = time.time()
                          if now - last_report >= 5 and not (total > 0 and downloaded >= total):
                              report("running", "downloading", downloaded, total, speed)
                              print(
                                  "Ferry HTTP progress: "
                                  f"{format_bytes(downloaded)} / {format_bytes(total)} "
                                  f"{format_bytes(speed)}/s",
                                  flush=True,
                              )
                              last_report = now
                      except Exception as exc:
                          print(f"HTTP progress check failed: {exc}")

                  status = process.wait()
                  elapsed = max(time.time() - started_at, 0.001)
                  if status != 0:
                      message = "HTTP download failed or stalled."
                      with open("ferry-error-message.txt", "w", encoding="utf-8") as error_file:
                          error_file.write(message)
                      subprocess.run(["tail", "-n", "120", "aria2-http.log"], check=False)
                      raise SystemExit(status)
                  report("running", "uploading", downloaded, total, int(downloaded / elapsed))
              finally:
                  try:
                      aria2_rpc("aria2.shutdown")
                  except Exception:
                      pass

          if is_http_source(source_url):
              download_http_source(source_url)
              raise SystemExit(0)

          def transmission_rpc(method, arguments=None):
              global session_id
              payload = json.dumps({
                  "method": method,
                  "arguments": arguments or {},
              }).encode()
              headers = {
                  "Content-Type": "application/json",
                  "X-Transmission-Session-Id": session_id,
              }
              req = urllib.request.Request(rpc_url, data=payload, method="POST", headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=15) as response:
                      result = json.loads(response.read().decode())
              except urllib.error.HTTPError as exc:
                  if exc.code == 409:
                      session_id = exc.headers["X-Transmission-Session-Id"]
                      return transmission_rpc(method, arguments)
                  detail = exc.read().decode(errors="replace")
                  raise RuntimeError(f"Transmission RPC HTTP {exc.code}: {detail[:300]}") from exc
              if result.get("result") != "success":
                  raise RuntimeError(f"Transmission RPC {method} failed: {result.get('result', 'unknown error')}")
              return result.get("arguments", {})

          settings_dir = os.path.expanduser("~/.config/transmission-daemon")
          os.makedirs(settings_dir, exist_ok=True)
          settings_path = os.path.join(settings_dir, "settings.json")
          settings = {
              "download-dir": os.path.abspath("out"),
              "incomplete-dir-enabled": False,
              "rpc-authentication-required": False,
              "rpc-bind-address": "127.0.0.1",
              "rpc-enabled": True,
              "rpc-port": 9091,
              "rpc-whitelist-enabled": False,
              "alt-speed-enabled": False,
              "cache-size-mb": 512,
              "dht-enabled": True,
              "encryption": 1,
              "pex-enabled": True,
              "lpd-enabled": True,
              "utp-enabled": True,
              "preallocation": 1,
              "peer-port": 51413,
              "peer-port-random-on-start": False,
              "peer-limit-global": 2000,
              "peer-limit-per-torrent": 1000,
              "download-queue-enabled": False,
              "speed-limit-down-enabled": False,
              "speed-limit-up-enabled": False,
              "ratio-limit-enabled": True,
              "ratio-limit": 0,
          }
          with open(settings_path, "w", encoding="utf-8") as settings_file:
              json.dump(settings, settings_file)

          daemon = subprocess.Popen(
              ["transmission-daemon", "--foreground", "--config-dir", settings_dir],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.STDOUT,
          )
          last_ready_error = None
          for _ in range(20):
              try:
                  transmission_rpc("session-get")
                  break
              except Exception as exc:
                  last_ready_error = exc
                  time.sleep(1)
          else:
              raise RuntimeError(f"Transmission RPC did not become ready: {last_ready_error}")

          downloaded = 0
          total = expected_total
          speed = peers = seeders = 0
          try:
              added = transmission_rpc("torrent-add", {
                  "filename": source_with_extra_trackers(source_url),
                  "download-dir": os.path.abspath("out"),
                  "paused": False,
              })
              torrent = added.get("torrent-added") or added.get("torrent-duplicate")
              if not torrent:
                  raise RuntimeError("Transmission did not accept the source.")
              torrent_id = torrent["id"]

              report("running", "downloading", 0, expected_total, 0, 0, 0)
              last_report = 0
              last_progress_at = time.time()
              last_progress_bytes = 0
              no_progress_timeout = 600

              while True:
                  time.sleep(5)
                  response = transmission_rpc("torrent-get", {
                      "ids": [torrent_id],
                      "fields": [
                          "id",
                          "status",
                          "error",
                          "errorString",
                          "percentDone",
                          "totalSize",
                          "haveValid",
                          "haveUnchecked",
                          "rateDownload",
                          "peersConnected",
                          "peersGettingFromUs",
                          "peersSendingToUs",
                      ],
                  })
                  torrents = response.get("torrents", [])
                  if not torrents:
                      raise RuntimeError("Transmission lost the torrent.")
                  item = torrents[0]
                  downloaded = int(item.get("haveValid", 0)) + int(item.get("haveUnchecked", 0))
                  total = int(item.get("totalSize", 0)) or expected_total
                  speed = int(item.get("rateDownload", 0))
                  peers = int(item.get("peersConnected", 0))
                  seeders = int(item.get("peersSendingToUs", 0))
                  percent_done = float(item.get("percentDone", 0))
                  error_code = int(item.get("error", 0))
                  if error_code:
                      raise RuntimeError(item.get("errorString") or "Transmission reported an error.")

                  now = time.time()
                  if now - last_report >= 15:
                      report("running", "downloading", downloaded, total, speed, peers, seeders)
                      percent_text = f"{percent_done * 100:.1f}%" if total else "unknown%"
                      print(
                          "Ferry progress: "
                          f"{format_bytes(downloaded)} / {format_bytes(total)} "
                          f"({percent_text}), {format_bytes(speed)}/s, "
                          f"{peers} peers, {seeders} sending",
                          flush=True,
                      )
                      last_report = now

                  if percent_done >= 1:
                      break

                  if downloaded > last_progress_bytes:
                      last_progress_bytes = downloaded
                      last_progress_at = now

                  if speed == 0 and now - last_progress_at >= no_progress_timeout:
                      message = (
                          f"Transmission made no file-piece progress for {no_progress_timeout // 60} minutes. "
                          f"Downloaded: {format_bytes(downloaded)} of {format_bytes(total)}. "
                          f"Connected peers: {peers}; peers sending data: {seeders}."
                      )
                      with open("ferry-error-message.txt", "w", encoding="utf-8") as error_file:
                          error_file.write(message)
                      report("failed", "failed", downloaded, total, speed, peers, seeders, message)
                      raise SystemExit(1)

              report("running", "uploading", downloaded, total, 0, peers, seeders)
          finally:
              try:
                  transmission_rpc("session-close")
              except Exception:
                  pass
              daemon.terminate()
              try:
                  daemon.wait(timeout=20)
              except subprocess.TimeoutExpired:
                  daemon.kill()
          PY

      - name: Build upload manifest
        run: |
          find out -type f -printf '%P\n' | sort > upload-manifest.txt
          test -s upload-manifest.txt || (echo "Download produced no files." && exit 1)
          cat upload-manifest.txt

      - name: Configure rclone
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          rclone listremotes

      - name: Upload to Drive
        env:
          DRIVE_FOLDER: ${{ inputs.drive_folder }}
        run: |
          rclone mkdir "gdrive:${DRIVE_FOLDER}"
          rclone move out "gdrive:${DRIVE_FOLDER}" \
            --progress \
            --transfers=8 \
            --checkers=16 \
            --drive-chunk-size=256M \
            --drive-upload-cutoff=256M \
            --fast-list \
            --delete-empty-src-dirs

      - name: Report success
        if: success()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          JOB_ID: ${{ inputs.job_id }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          DRIVE_FOLDER: ${{ inputs.drive_folder }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import hashlib, hmac, json, os, subprocess, urllib.parse, urllib.request

          drive_folder = os.environ["DRIVE_FOLDER"]
          with open("upload-manifest.txt", "r", encoding="utf-8") as manifest:
              first_file = next((line.strip() for line in manifest if line.strip()), "")

          fallback = f"https://drive.google.com/drive/search?q={urllib.parse.quote(drive_folder)}"
          drive_link = fallback
          if first_file:
              remote_path = f"gdrive:{drive_folder}/{first_file}"
              try:
                  link = subprocess.check_output(
                      ["rclone", "link", remote_path],
                      text=True,
                      stderr=subprocess.STDOUT,
                      timeout=30,
                  ).strip()
                  if link:
                      drive_link = link
              except Exception as exc:
                  print(f"Unable to create direct Drive link for {remote_path}: {exc}")

          body = json.dumps({
              "jobId": os.environ["JOB_ID"],
              "status": "completed",
              "driveLink": drive_link,
              "workflowRunId": os.environ["WORKFLOW_RUN_ID"],
          }, separators=(",", ":")).encode()
          sig = "sha256=" + hmac.new(os.environ["WEBHOOK_SECRET"].encode(), body, hashlib.sha256).hexdigest()
          req = urllib.request.Request(os.environ["CALLBACK_URL"], data=body, method="POST", headers={
              "Content-Type": "application/json",
              "User-Agent": "Ferry-Runner/1.0",
              "X-Ferry-Signature": sig,
          })
          urllib.request.urlopen(req, timeout=20).read()
          PY

      - name: Report failure
        if: failure()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          JOB_ID: ${{ inputs.job_id }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import hashlib, hmac, json, os, urllib.request
          run_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['WORKFLOW_RUN_ID']}"
          error_message = f"GitHub Actions runner failed. Check workflow logs: {run_url}"
          try:
              with open("ferry-error-message.txt", "r", encoding="utf-8") as error_file:
                  error_message = error_file.read().strip() or error_message
          except FileNotFoundError:
              pass
          body = json.dumps({
              "jobId": os.environ["JOB_ID"],
              "status": "failed",
              "workflowRunId": os.environ["WORKFLOW_RUN_ID"],
              "errorMessage": error_message,
          }, separators=(",", ":")).encode()
          sig = "sha256=" + hmac.new(os.environ["WEBHOOK_SECRET"].encode(), body, hashlib.sha256).hexdigest()
          req = urllib.request.Request(os.environ["CALLBACK_URL"], data=body, method="POST", headers={
              "Content-Type": "application/json",
              "User-Agent": "Ferry-Runner/1.0",
              "X-Ferry-Signature": sig,
          })
          try:
              urllib.request.urlopen(req, timeout=20).read()
          except Exception as exc:
              print(f"Webhook failure report failed: {exc}")
          PY
